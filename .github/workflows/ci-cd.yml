name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

env:
  REGISTRY: ghcr.io
  # Fixed name; consumed by tenants/demo and tenants/tenant-b registry entries.
  IMAGE_NAME: k6gnn/deployaz-demo

jobs:
  secret-scan:
    # Runs first, on every push AND pull_request, against the full history --
    # catches a committed secret before it ever reaches a build step or a log.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: mvn -B clean verify

  build-scan-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # Required for keyless cosign signing: GitHub mints an OIDC token,
      # Fulcio exchanges it for a short-lived signing cert bound to THIS
      # workflow's identity. No signing key exists to store or leak.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image locally (not pushed yet)
        uses: docker/build-push-action@v5
        with:
          context: app
          load: true
          push: false
          tags: local-scan:${{ github.sha }}

      - name: Scan image for CRITICAL/HIGH CVEs (Trivy)
        # Pinned to the full commit SHA, not a tag -- trivy-action had a real
        # supply-chain attack (March 2026, TeamPCP) where 75+ version tags
        # were force-pushed to malicious commits. GitHub's "Immutable
        # release" badge does NOT prevent this (confirmed by Aqua's own
        # incident writeup) -- only a full SHA is a reliable pin. This SHA
        # is aquasecurity/trivy-action's v0.36.0 tag commit.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: local-scan:${{ github.sha }}
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          format: table
        # If this step fails, the job stops here -- nothing below runs, so a
        # vulnerable image is never pushed to GHCR and never reaches
        # the tenant registry. This is the CI-time gate. Gatekeeper (Phase
        # 3, admission-time) is the second, independent gate in case an image
        # ever reaches the registry any other way (e.g. a manual push).

      - name: Log in to GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push scanned image
        if: success()
        id: push
        run: |
          docker tag local-scan:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag local-scan:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Capture the pushed DIGEST -- signatures bind to digests, not
          # tags. Signing a tag would let a later force-pushed tag inherit
          # the signature; signing the digest cannot be repointed.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }})
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: success()
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless, workflow identity)
        if: success()
        run: |
          # --yes: non-interactive consent to upload to the Rekor public
          # transparency log. The signature is verified at ADMISSION by the
          # sigstore policy-controller (k8s/policy-controller/) -- this
          # replaces "trust the annotation CI wrote" with "verify a
          # cryptographic identity", closing the gap documented since
          # Phase 3.
          cosign sign --yes "${{ steps.push.outputs.digest }}"

      - name: Update tenant registry with new image tag and scan status
        if: success()
        run: |
          # Phase 4.5: the hand-written k8s/base and k8s/tenants manifests are
          # gone. Both platform tenants (demo, tenant-b) are ordinary registry
          # entries now -- same shape as onboarded tenants -- so the image bump
          # is a config.json update, not a sed over YAML. Both run the same
          # image (tenant-b is synthetic, proving platform isolation rather
          # than app diversity), so both entries get the bump, or tenant-b
          # silently stops receiving updates.
          IMG="${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"
          for t in demo tenant-b; do
            jq --arg img "$IMG" --arg sha "${{ github.sha }}" \
              '.image = $img | .scannedSha = $sha | .trivyScanPassed = "true"' \
              "tenants/$t/config.json" > /tmp/cfg.json
            mv /tmp/cfg.json "tenants/$t/config.json"
          done
          git config user.name "deployaz-ci"
          git config user.email "ci@deployaz.local"
          git add tenants/demo/config.json tenants/tenant-b/config.json
          git diff --cached --quiet || git commit -m "ci: bump image to ${{ github.sha }}, mark Trivy-scanned"
          # main may have moved since this job's checkout (e.g. someone
          # pushed another commit while this run was still building/scanning
          # the image) -- rebase onto the latest before pushing, or this
          # push is correctly rejected as a non-fast-forward.
          git fetch origin main
          git rebase origin/main
          git push
