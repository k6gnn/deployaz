name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

env:
  REGISTRY: ghcr.io
  # Fixed name so it matches k8s/base/deployment.yaml exactly.
  IMAGE_NAME: k6gnn/deployaz-demo

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: mvn -B clean verify

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Update GitOps manifests with new image tag
        run: |
          # Both tenants run the same image (tenant-b is synthetic, proving platform
          # isolation rather than app diversity) -- so both deployment manifests need
          # the tag bump, or tenant-b silently stops getting updates after this point.
          sed -i "s|image: .*deployaz-demo:.*|image: ${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}|" k8s/base/deployment.yaml
          sed -i "s|image: .*deployaz-demo:.*|image: ${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}|" k8s/tenants/tenant-b/deployment.yaml
          git config user.name "deployaz-ci"
          git config user.email "ci@deployaz.local"
          git add k8s/base/deployment.yaml k8s/tenants/tenant-b/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: bump image to ${{ github.sha }}"
          git push
