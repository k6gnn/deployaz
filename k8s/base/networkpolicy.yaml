# Default-deny everything in this namespace, then explicitly allow only what's needed:
# DNS egress (or pods can't resolve anything) and ingress from the ingress controller.
# Everything else -- including traffic from other tenant namespaces -- is blocked.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: deployaz-demo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: deployaz-demo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-nginx
  namespace: deployaz-demo
spec:
  podSelector:
    matchLabels:
      app: deployaz-demo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# Phase 3: actuator/prometheus moved to the management port (8081), which is
# NOT covered by the nginx rule above (that rule doesn't restrict by port, so
# note it technically already allows nginx -> 8081 too -- this rule is what
# actually matters: it's the only thing permitting the monitoring namespace
# in at all. Without it, Prometheus can't scrape this pod, same gap this
# phase's health indicator would otherwise go unnoticed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-monitoring
  namespace: deployaz-demo
spec:
  podSelector:
    matchLabels:
      app: deployaz-demo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081
