apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployaz-demo
  namespace: deployaz-demo
  labels:
    app: deployaz-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployaz-demo
  template:
    metadata:
      labels:
        app: deployaz-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: deployaz-demo
          # CI overwrites this tag on every push to main — do not hand-edit the tag.
          image: ghcr.io/k6gnn/deployaz-demo:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
