apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployaz-demo
  namespace: deployaz-demo
  labels:
    app: deployaz-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployaz-demo
  template:
    metadata:
      labels:
        app: deployaz-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
        # CI overwrites these two on every successful build-scan-push run (see
        # .github/workflows/ci-cd.yml). Gatekeeper's ConstraintTemplate checks
        # both before admitting a Deployment change. Note this is a policy
        # signal CI asserts, not a cryptographic attestation -- a real
        # hardening step beyond this phase would be image signing (cosign)
        # verified by Gatekeeper/Kyverno directly against the registry,
        # rather than trusting an annotation the pipeline wrote.
        security.deployaz.io/trivy-scan-passed: "false"
        security.deployaz.io/scanned-sha: "unscanned"
        # --- Vault Agent Injector (Phase 3) ---
        # Injector mutates this pod at admission time: adds an init container
        # that fetches the secret once before the app starts, plus a sidecar
        # that keeps it renewed. The app never talks to Vault directly.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "tenant-a-role"
        vault.hashicorp.com/agent-inject-secret-db-password: "secret/data/deployaz-demo/db"
        # Template extracts just the db_password field into a plain file at
        # /vault/secrets/db-password so the app can read it as a Spring Boot
        # config file source, not an env var.
        vault.hashicorp.com/agent-inject-template-db-password: |
          {{- with secret "secret/data/deployaz-demo/db" -}}
          {{ .Data.data.db_password }}
          {{- end -}}
    spec:
      serviceAccountName: tenant-a-sa
      containers:
        - name: deployaz-demo
          # CI overwrites this tag on every push to main — do not hand-edit the tag.
          image: ghcr.io/k6gnn/deployaz-demo:a6f26998d96c25e3f7392ba45e8ba7bb19178ef9
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          env:
            - name: DEPLOYAZ_SECRETS_REQUIRE
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            # Vault Agent's init container must fetch the secret before this
            # container even starts, and SecretStartupCheck then verifies it
            # on boot -- both add real time before the app is ready. Bumped
            # from 15s (Phase 2) to give room for that without flapping.
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 20
