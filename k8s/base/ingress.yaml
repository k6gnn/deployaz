apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deployaz-demo
  namespace: deployaz-demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: demo.deployaz.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deployaz-demo
                port:
                  number: 80
