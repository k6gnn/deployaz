apiVersion: v1
kind: Namespace
metadata:
  name: deployaz-demo
  labels:
    app.kubernetes.io/part-of: deployaz-platform
    # Phase 4: Gatekeeper's Trivy-scan constraint now selects namespaces by
    # this label instead of a hardcoded list. Removing it silently removes
    # this namespace from admission-time scan enforcement.
    deployaz.io/tenant-workloads: "true"
