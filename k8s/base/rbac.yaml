# Scopes a hypothetical tenant-a client identity to only this namespace.
# This is what proves tenant A cannot touch tenant B's resources via kubectl/API,
# separate from the NetworkPolicy which blocks it at the pod-traffic level.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-a-sa
  namespace: deployaz-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-a-namespace-admin
  namespace: deployaz-demo
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods", "services", "deployments", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-a-namespace-admin-binding
  namespace: deployaz-demo
subjects:
  - kind: ServiceAccount
    name: tenant-a-sa
    namespace: deployaz-demo
roleRef:
  kind: Role
  name: tenant-a-namespace-admin
  apiGroup: rbac.authorization.k8s.io
