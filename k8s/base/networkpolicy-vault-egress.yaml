# Fix for a latent Phase 3 bug found via Loki on the first day of Phase 4:
# default-deny-all denies Egress, and the only egress allow was DNS (53).
# The Vault Agent (init + sidecar) therefore never had a legal path to
# Vault on 8200 -- the init fetch only ever succeeded through a CNI policy-
# enforcement race at pod startup, and sidecar token renewals were silently
# timing out. Green pods, broken secrets layer, invisible until logs were
# centralized.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-vault
  namespace: deployaz-demo
spec:
  podSelector:
    matchLabels:
      app: deployaz-demo
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
