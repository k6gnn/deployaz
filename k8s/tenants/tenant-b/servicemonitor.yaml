apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: deployaz-tenant-b
  namespace: deployaz-tenant-b
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: deployaz-tenant-b
  namespaceSelector:
    matchNames:
      - deployaz-tenant-b
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
