apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployaz-tenant-b
  namespace: deployaz-tenant-b
  labels:
    app: deployaz-tenant-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployaz-tenant-b
  template:
    metadata:
      labels:
        app: deployaz-tenant-b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: deployaz-tenant-b
          # Same image as tenant-a -- this is a synthetic second tenant proving the
          # PLATFORM's isolation, not a different app. CI updates this tag too (see ci-cd.yml).
          image: ghcr.io/k6gnn/deployaz-demo:41241156e00101b9b79b07be029a754f50d1491f
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
