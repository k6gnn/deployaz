apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployaz-tenant-b
  namespace: deployaz-tenant-b
  labels:
    app: deployaz-tenant-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployaz-tenant-b
  template:
    metadata:
      labels:
        app: deployaz-tenant-b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
        security.deployaz.io/trivy-scan-passed: "true"
        security.deployaz.io/scanned-sha: "9a40b4b22b65b9ff30f5f9a5d489257a832cb121"
    spec:
      # Deliberately NOT bound to any Vault role -- tenant-b-sa has no
      # matching entry in auth/kubernetes/role/*, so DEPLOYAZ_SECRETS_REQUIRE
      # stays unset (defaults to false in application.yml). This tenant
      # doesn't get a secret, and that absence is itself part of the
      # isolation proof for this phase.
      serviceAccountName: tenant-b-sa
      containers:
        - name: deployaz-tenant-b
          # Same image as tenant-a -- this is a synthetic second tenant proving the
          # PLATFORM's isolation, not a different app. CI updates this tag too (see ci-cd.yml).
          image: ghcr.io/k6gnn/deployaz-demo:9a40b4b22b65b9ff30f5f9a5d489257a832cb121
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
