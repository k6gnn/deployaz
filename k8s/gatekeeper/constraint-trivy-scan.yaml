apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireTrivyScan
metadata:
  name: require-trivy-scan-tenant-workloads
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    # PHASE 4 CHANGE: matching by namespace *label* instead of a hardcoded
    # namespace list. The old explicit list (deployaz-demo, deployaz-tenant-b)
    # was correct when tenants were hand-written, but Phase 4 creates tenant
    # namespaces automatically -- every new self-service tenant would have
    # silently bypassed this gate. That is exactly the kind of hole automation
    # creates when policy doesn't scale with it.
    #
    # Every namespace the platform manages (static or generated by the tenant
    # chart) carries this label. Control-plane namespaces (kube-system, argocd,
    # vault, gatekeeper-system, monitoring, logging) do NOT carry it, so they
    # remain unaffected -- same safety property as the old list, but it now
    # scales to N tenants with zero edits to this file.
    namespaceSelector:
      matchLabels:
        deployaz.io/tenant-workloads: "true"
