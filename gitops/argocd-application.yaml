apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deployaz-demo
  namespace: argocd
spec:
  project: default
  source:
    # Replace with your actual repo URL once pushed to GitHub.
    repoURL: https://github.com/OWNER/deployaz-platform.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: deployaz-demo
  syncPolicy:
    automated:
      prune: true       # remove resources deleted from Git
      selfHeal: true     # revert manual cluster drift back to Git state
    syncOptions:
      - CreateNamespace=true
