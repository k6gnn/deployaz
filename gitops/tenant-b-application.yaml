apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deployaz-tenant-b
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/k6gnn/deployaz.git
    targetRevision: main
    path: k8s/tenants/tenant-b
  destination:
    server: https://kubernetes.default.svc
    namespace: deployaz-tenant-b
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
