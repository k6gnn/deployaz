# The Phase 4 core, extended in Phase 4.5: one ApplicationSet watches
# tenants/*/config.json in this repo. Every file there becomes a full ArgoCD
# Application instantiating charts/tenant with that tenant's values. As of
# Phase 4.5 this includes the platform's own demo app and tenant-b -- the
# hand-written k8s/base and k8s/tenants trees are gone. One shape, N tenants.
#
# missingkey=error is deliberate and unforgiving: every config.json MUST
# contain every key referenced below (schema v2). A schema change and all
# config.json updates must always land in the SAME commit.
#
# Trust chain, stated plainly: the ONLY writer of tenants/ files is
# .github/workflows/onboard-tenant.yml (new tenants) and ci-cd.yml (image
# bumps for demo/tenant-b), both of which only write after a Trivy scan
# passed. Gatekeeper then independently re-checks the scan annotations at
# admission time. Two gates, same as Phase 3.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: deployaz-tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/k6gnn/deployaz.git
        revision: main
        files:
          - path: "tenants/*/config.json"
  # NOTE (found the hard way): every templated value below is quoted, because
  # kubectl's YAML parser rejects a value starting with "{{". Quoting means
  # ALL values reach the chart as strings -- the chart therefore coerces
  # types itself (int for numbers, toString-comparison for booleans). Do not
  # "clean up" the quotes or the un-coerced conditionals come back.
  template:
    metadata:
      name: "tenant-{{ .name }}"
      labels:
        deployaz.io/tenant: "{{ .name }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/k6gnn/deployaz.git
        targetRevision: main
        path: charts/tenant
        helm:
          valuesObject:
            tenant:
              name: "{{ .name }}"
              image: "{{ .image }}"
              port: "{{ .port }}"
              host: "{{ .host }}"
              replicas: "{{ .replicas }}"
              trivyScanPassed: "{{ .trivyScanPassed }}"
              scannedSha: "{{ .scannedSha }}"
              healthPath: "{{ .healthPath }}"
              healthPort: "{{ .healthPort }}"
              metrics:
                enabled: "{{ .metrics.enabled }}"
                port: "{{ .metrics.port }}"
                path: "{{ .metrics.path }}"
              vault:
                enabled: "{{ .vault.enabled }}"
                role: "{{ .vault.role }}"
                secretPath: "{{ .vault.secretPath }}"
      destination:
        server: https://kubernetes.default.svc
        # Chart manages its own Namespace object; this is only where ArgoCD
        # tracks non-namespaced state.
        namespace: "deployaz-{{ .name }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
