apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-{{ .Values.tenant.name }}-sa
  namespace: deployaz-{{ .Values.tenant.name }}
---
# Deliberately minimal: a tenant SA can read its own pods/logs and nothing
# else, nowhere else. No RoleBinding exists in any other namespace, which
# is the actual isolation property (proven the same way as Phase 2:
# kubectl auth can-i ... --as=system:serviceaccount:...).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-{{ .Values.tenant.name }}-role
  namespace: deployaz-{{ .Values.tenant.name }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-{{ .Values.tenant.name }}-binding
  namespace: deployaz-{{ .Values.tenant.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-{{ .Values.tenant.name }}-role
subjects:
  - kind: ServiceAccount
    name: tenant-{{ .Values.tenant.name }}-sa
    namespace: deployaz-{{ .Values.tenant.name }}
