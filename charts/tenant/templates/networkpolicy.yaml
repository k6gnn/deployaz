# Same isolation posture as Phase 2 tenants: default-deny everything, then
# explicitly allow only ingress-nginx (user traffic) and monitoring
# (Prometheus scrapes). Tenant-to-tenant traffic is blocked by omission.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: deployaz-{{ .Values.tenant.name }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress-nginx
  namespace: deployaz-{{ .Values.tenant.name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.tenant.name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.tenant.port | int }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-monitoring
  namespace: deployaz-{{ .Values.tenant.name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.tenant.name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
