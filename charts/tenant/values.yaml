# These are defaults only. Real values come from tenants/<name>/config.json
# via the ApplicationSet -- the onboarding workflow writes that file after
# (and only after) the tenant image passed the Trivy scan.
#
# SCHEMA v2 (Phase 4.5 consolidation). The ApplicationSet runs with
# missingkey=error, so EVERY tenants/*/config.json must contain EVERY key
# the ApplicationSet template references -- optional features are expressed
# as enabled:false, never as an absent key.
tenant:
  name: example
  # Full image reference, tag included. Written by the onboarding workflow;
  # the tag is the tenant repo's commit SHA that was actually scanned.
  image: ghcr.io/k6gnn/deployaz-tenant-example:0000000
  port: 8080
  host: example.deployaz.local
  replicas: 1
  # Gatekeeper admission gate inputs. The onboarding workflow sets these to
  # the real scanned SHA; hand-editing them to sneak an unscanned image in
  # is exactly what the (documented) cosign-signing hardening step will
  # close -- same known limitation as Phases 1-4, stated, not hidden.
  trivyScanPassed: "false"
  scannedSha: ""
  # Empty healthPath => universal TCP probes (arbitrary tenant apps have no
  # guaranteed HTTP endpoint). Non-empty => HTTP probes on healthPort
  # (healthPort 0 => same as tenant.port).
  healthPath: ""
  healthPort: 0
  # Metrics are opt-in: the app must actually expose a Prometheus endpoint.
  # Enabling adds the management container/Service port, a ServiceMonitor,
  # and a port-restricted NetworkPolicy allowance from the monitoring
  # namespace. Logs need none of this -- Promtail ships every pod's stdout
  # regardless.
  metrics:
    enabled: false
    port: 0
    path: ""
  # Vault agent injection is opt-in and still requires a one-time operator
  # step per tenant (policy + role in vault-setup.sh). The injected secret
  # is exposed at /vault/secrets/db-password (field db_password) -- a fixed
  # platform convention for now. Vault-enabled tenants also get the env var
  # DEPLOYAZ_SECRETS_REQUIRE=true (apps may honor it to fail fast when the
  # secret is missing; apps that don't know it simply ignore it).
  vault:
    enabled: false
    role: ""
    secretPath: ""
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
quota:
  pods: "10"
  requestsCpu: "2"
  requestsMemory: 2Gi
  limitsCpu: "3"
  limitsMemory: 3Gi
